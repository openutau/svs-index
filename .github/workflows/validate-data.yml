name: Validate Data

on:
  pull_request:
    paths:
      - "data/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate changed data files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.12.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine changed data files
        id: changed
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          files=$(git diff --name-only --diff-filter=d "origin/$BASE_REF"...HEAD -- 'data/singers/*.json' 'data/softwares/*.json')
          echo "Changed data files:"
          echo "$files"
          # Pass the (possibly empty) newline-separated list to the next step.
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate
        env:
          FILES: ${{ steps.changed.outputs.files }}
        run: |
          if [ -z "$(echo "$FILES" | tr -d '[:space:]')" ]; then
            echo "No singer/software data files changed; nothing to validate."
            exit 0
          fi
          echo "$FILES" | xargs node scripts/validate-data.js
